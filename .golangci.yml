version: "2"

run:
  timeout: 5m

linters-settings:
  misspell:
    ignore-words:
      - noteable  # GitLab API uses this spelling

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - nolintlint

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
